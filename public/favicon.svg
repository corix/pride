<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PA Pride">
  <defs>
    <!-- Downward-pointing triangle -->
    <clipPath id="mark">
      <path d="M32 58 L6 14 H58 Z" />
    </clipPath>
  </defs>

  <!-- Solid mark: baby trans pink -->
  <path d="M32 58 L6 14 H58 Z" fill="#fa8cbc" />

  <!-- Subtle outline to read at small sizes -->
  <path
    d="M32 58 L6 14 H58 Z"
    fill="none"
    stroke="rgba(0,0,0,0.28)"
    stroke-width="2"
    stroke-linejoin="round"
  />
</svg>
